name: BMO Campus Energy Fetch

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch campus energy data
        env:
          BMO_USERNAME: ${{ secrets.BMO_USERNAME }}
          BMO_PASSWORD: ${{ secrets.BMO_PASSWORD }}
        run: python bmo_fetch_campus.py

      - name: Commit and push
        run: |
          git config user.name "BMO Auto-Fetcher"
          git config user.email "bmo@github-actions.bot"
          git add data/campus_energy.json
          git diff --staged --quiet || git commit -m "🔋 Update campus energy $(date +'%H:%M')"
          git pull --rebase || true
          git push
