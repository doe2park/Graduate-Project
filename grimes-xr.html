<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimes MEP · XR Walkthrough</title>
<style>
  :root { --cyan: #2dd4bf; --bg: #0a0e1a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; }

  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--bg); z-index: 100;
    font-size: 18px; gap: 16px;
  }
  .spinner { width: 48px; height: 48px; border: 3px solid #334155;
    border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* VR Button */
  #enterXR {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--cyan); color: #000; font-weight: 800; font-size: 20px;
    padding: 18px 48px; border: none; border-radius: 16px; cursor: pointer;
    box-shadow: 0 6px 32px rgba(45,212,191,0.5); z-index: 50; display: none;
  }

  /* System Legend + Toggles */
  #legend {
    position: fixed; top: 12px; left: 12px; z-index: 50;
    background: rgba(10,14,26,0.92); padding: 14px 16px; border-radius: 12px;
    backdrop-filter: blur(10px); border: 1px solid rgba(45,212,191,0.15);
    max-width: 220px; font-size: 12px;
  }
  #legend h3 { font-size: 14px; color: var(--cyan); margin-bottom: 10px; }
  .sys-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    cursor: pointer; user-select: none; transition: opacity 0.2s;
  }
  .sys-row:hover { opacity: 0.8; }
  .sys-row.off { opacity: 0.3; text-decoration: line-through; }
  .sys-dot {
    width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .sys-name { flex: 1; }
  .sys-count { color: #64748b; font-size: 11px; }

  /* Info panel on click */
  #clickInfo {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(10,14,26,0.92); padding: 14px 24px; border-radius: 12px;
    backdrop-filter: blur(10px); border: 1px solid rgba(45,212,191,0.3);
    font-size: 14px; text-align: center; z-index: 50; display: none;
    max-width: 400px;
  }
  #clickInfo .sys-tag {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-weight: 700; font-size: 13px; margin-bottom: 6px;
  }
  #clickInfo .detail { color: #94a3b8; font-size: 12px; }

  /* Controls hint */
  #ctrlHint {
    position: fixed; bottom: 12px; left: 12px; z-index: 40;
    font-size: 10px; color: #475569; line-height: 1.5;
  }

  /* On-screen joysticks */
  .joystick-zone {
    position: fixed; bottom: 20px; z-index: 40; width: 110px; height: 110px;
    border-radius: 50%; background: rgba(45,212,191,0.06);
    border: 2px solid rgba(45,212,191,0.15); touch-action: none;
  }
  #joystickMove { left: 24px; }
  #joystickLook { right: 24px; }
  .joystick-knob {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(45,212,191,0.4); border: 2px solid var(--cyan);
    pointer-events: none;
  }
  .joystick-label {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: 1px;
  }

  /* Floor nav */
  #floorNav {
    position: fixed; right: 14px; top: 50%; transform: translateY(-50%); z-index: 40;
    display: flex; flex-direction: column; gap: 4px;
  }
  .fl-btn {
    background: rgba(45,212,191,0.08); border: 1px solid rgba(45,212,191,0.15);
    color: #64748b; padding: 7px 12px; border-radius: 6px; cursor: pointer;
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .fl-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadText">Loading MEP...</div></div>

<!-- System Legend -->
<div id="legend">
  <h3>MEP Systems</h3>
  <div id="systemList"></div>
</div>

<!-- Click Info -->
<div id="clickInfo">
  <div class="sys-tag" id="ciTag">—</div><br>
  <div class="detail" id="ciDetail">Click on MEP to inspect</div>
</div>

<!-- Floor Nav -->
<div id="floorNav">
  <button class="fl-btn" data-y="17">SRV</button>
  <button class="fl-btn" data-y="13">L3</button>
  <button class="fl-btn" data-y="9">L2</button>
  <button class="fl-btn" data-y="5">L1</button>
  <button class="fl-btn active" data-y="1.6">B1</button>
</div>

<!-- Joysticks -->
<div class="joystick-zone" id="joystickMove"><div class="joystick-label">Move</div><div class="joystick-knob" id="moveKnob"></div></div>
<div class="joystick-zone" id="joystickLook"><div class="joystick-label">Look</div><div class="joystick-knob" id="lookKnob"></div></div>

<div id="ctrlHint">WASD move · QE up/down · Click MEP to inspect · ESC orbit mode</div>

<button id="enterXR">🥽 ENTER VR</button>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

/* ── System metadata (matches GLB mesh order from v4 extraction) ── */
const SYSTEM_INFO = [
  { id:'hvac_duct',  label:'HVAC Ductwork',   color:'#2dd4bf', hex:0x2dd4bf },
  { id:'hvac_equip', label:'HVAC Equipment',   color:'#1ab3a6', hex:0x1ab3a6 },
  { id:'pipe',       label:'Plumbing / Piping', color:'#38bdf8', hex:0x38bdf8 },
  { id:'sprinkler',  label:'Fire Protection',   color:'#fb923c', hex:0xfb923c },
  { id:'conduit',    label:'Electrical',        color:'#f59e0b', hex:0xf59e0b },
  { id:'diffuser',   label:'Diffusers / Grilles', color:'#80f2cc', hex:0x80f2cc },
  { id:'pump',       label:'Pumps',             color:'#67d9f2', hex:0x67d9f2 },
  { id:'spiral',     label:'Spiral Ductwork',   color:'#4de6cc', hex:0x4de6cc },
];

/* ══════════════════════════════════════════ RENDERER ══════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0e1a, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.2;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

/* ══════════════════════════════════════════ SCENE ══════════════════════════════════════════ */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0e1a, 0.006);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 300);
camera.position.set(0, 6, 0);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.1;
orbitControls.target.set(0, 6, -5);

/* ── Lights ── */
scene.add(new THREE.AmbientLight(0xffffff, 2.0));
const sun = new THREE.DirectionalLight(0xffffff, 3.0);
sun.position.set(30, 50, 20); scene.add(sun);
const fill1 = new THREE.DirectionalLight(0xaaccff, 2.0);
fill1.position.set(-30, 20, -20); scene.add(fill1);
const fill2 = new THREE.DirectionalLight(0xffeedd, 1.5);
fill2.position.set(0, -10, 30); scene.add(fill2);
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.5));

/* ── Grid + floors ── */
const grid = new THREE.GridHelper(80, 40, 0x2dd4bf, 0x1a2535);
grid.material.opacity = 0.12; grid.material.transparent = true; scene.add(grid);

const floorMat = new THREE.MeshBasicMaterial({ color:0x2dd4bf, transparent:true, opacity:0.03, side:THREE.DoubleSide });
[0,4,8,12,16].forEach(y => {
  const p = new THREE.Mesh(new THREE.PlaneGeometry(70,55), floorMat);
  p.rotation.x = -Math.PI/2; p.position.y = y; scene.add(p);
});

/* ══════════════════════════════════════════ LOAD MODEL ══════════════════════════════════════════ */
const loadingEl = document.getElementById('loadText');
const allMeshes = [];         // all mesh objects
const systemMeshes = [];      // { mesh, sysIndex, visible }
const systemVisible = new Array(8).fill(true);

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

loader.load('grimes-mep-only.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);

  let meshIdx = 0;
  model.traverse(child => {
    if (child.isMesh) {
      allMeshes.push(child);

      const sysIdx = Math.min(meshIdx, SYSTEM_INFO.length - 1);
      const sys = SYSTEM_INFO[sysIdx];

      // Apply distinctive material per system
      child.material = new THREE.MeshStandardMaterial({
        color: sys.hex,
        emissive: sys.hex,
        emissiveIntensity: 0.35,
        metalness: 0.3,
        roughness: 0.4,
        side: THREE.DoubleSide,
      });

      child.userData.sysIndex = sysIdx;
      child.userData.sysLabel = sys.label;
      systemMeshes.push({ mesh: child, sysIndex: sysIdx });
      meshIdx++;
    }
  });

  document.getElementById('loading').style.display = 'none';
  buildLegend();
  setupXR();

}, (progress) => {
  const mb = (progress.loaded / 1024 / 1024).toFixed(1);
  loadingEl.textContent = `Loading MEP... ${mb} MB`;
}, () => {
  loadingEl.textContent = 'Error loading model';
  loadingEl.style.color = '#f87171';
});

/* ══════════════════════════════════════════ LEGEND + TOGGLES ══════════════════════════════════════════ */
function buildLegend() {
  const list = document.getElementById('systemList');

  // Count faces per system
  const counts = {};
  systemMeshes.forEach(sm => {
    const geo = sm.mesh.geometry;
    const faceCount = geo.index ? geo.index.count / 3 : 0;
    counts[sm.sysIndex] = (counts[sm.sysIndex] || 0) + faceCount;
  });

  SYSTEM_INFO.forEach((sys, i) => {
    if (!counts[i]) return; // skip empty systems

    const row = document.createElement('div');
    row.className = 'sys-row';
    row.dataset.idx = i;
    row.innerHTML = `
      <div class="sys-dot" style="background:${sys.color}"></div>
      <span class="sys-name">${sys.label}</span>
      <span class="sys-count">${Math.round(counts[i] / 1000)}K</span>
    `;
    row.addEventListener('click', () => toggleSystem(i, row));
    list.appendChild(row);
  });
}

function toggleSystem(idx, row) {
  systemVisible[idx] = !systemVisible[idx];
  row.classList.toggle('off', !systemVisible[idx]);

  systemMeshes.forEach(sm => {
    if (sm.sysIndex === idx) {
      sm.mesh.visible = systemVisible[idx];
    }
  });
}

/* ══════════════════════════════════════════ CLICK TO INSPECT ══════════════════════════════════════════ */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const clickInfo = document.getElementById('clickInfo');
const ciTag = document.getElementById('ciTag');
const ciDetail = document.getElementById('ciDetail');
let highlightedMesh = null;
let originalMat = null;

renderer.domElement.addEventListener('click', (e) => {
  // Ignore if joystick area
  if (e.target !== renderer.domElement) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(allMeshes, false);

  // Restore previous
  if (highlightedMesh && originalMat) {
    highlightedMesh.material = originalMat;
  }

  if (hits.length > 0) {
    const mesh = hits[0].object;
    const point = hits[0].point;
    const sysIdx = mesh.userData.sysIndex ?? 0;
    const sys = SYSTEM_INFO[sysIdx];

    // Highlight
    originalMat = mesh.material;
    highlightedMesh = mesh;
    mesh.material = new THREE.MeshStandardMaterial({
      color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.7,
      metalness: 0.1, roughness: 0.2, side: THREE.DoubleSide
    });

    // Floor detection
    let floor = 'B1';
    if (point.y > 3) floor = 'L1';
    if (point.y > 7) floor = 'L2';
    if (point.y > 11) floor = 'L3';
    if (point.y > 15) floor = 'SRV';

    ciTag.textContent = sys.label;
    ciTag.style.background = sys.color;
    ciTag.style.color = '#000';
    ciDetail.textContent = `Floor ${floor} · Height ${point.y.toFixed(1)}m · (${point.x.toFixed(1)}, ${point.z.toFixed(1)})`;
    clickInfo.style.display = 'block';
  } else {
    clickInfo.style.display = 'none';
    highlightedMesh = null;
    originalMat = null;
  }
});

/* ══════════════════════════════════════════ FLOOR NAV ══════════════════════════════════════════ */
document.getElementById('floorNav').addEventListener('click', (e) => {
  const btn = e.target.closest('.fl-btn');
  if (!btn) return;
  camera.position.y = parseFloat(btn.dataset.y);
  document.querySelectorAll('.fl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!fpMode) { fpMode = true; orbitControls.enabled = false; }
});

/* ══════════════════════════════════════════ FIRST PERSON (WASD) ══════════════════════════════════════════ */
const keys = {};
let fpMode = false;
const FP_SPEED = 0.15;

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (['KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE'].includes(e.code) && !fpMode) {
    fpMode = true; orbitControls.enabled = false;
    renderer.domElement.requestPointerLock?.();
  }
  if (e.code === 'Escape') { fpMode = false; orbitControls.enabled = true; document.exitPointerLock?.(); }
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

document.addEventListener('mousemove', (e) => {
  if (!fpMode || !document.pointerLockElement) return;
  camera.rotation.y -= e.movementX * 0.002;
  camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002));
});
document.addEventListener('pointerlockchange', () => {
  if (!document.pointerLockElement) { fpMode = false; orbitControls.enabled = true; }
});

function updateFP() {
  if (!fpMode) return;
  let mx=0, my=0, mz=0;
  if (keys['KeyW']) mz=-1; if (keys['KeyS']) mz=1;
  if (keys['KeyA']) mx=-1; if (keys['KeyD']) mx=1;
  if (keys['KeyQ']) my=-1; if (keys['KeyE']) my=1;
  if (keys['ArrowLeft']) camera.rotation.y += 0.02;
  if (keys['ArrowRight']) camera.rotation.y -= 0.02;
  if (keys['ArrowUp']) camera.rotation.x += 0.015;
  if (keys['ArrowDown']) camera.rotation.x -= 0.015;

  if (mx || mz) {
    const yaw = camera.rotation.y;
    const s = Math.sin(yaw), c = Math.cos(yaw);
    camera.position.x += (mx*c - mz*s) * FP_SPEED;
    camera.position.z += (mx*s + mz*c) * FP_SPEED;
  }
  camera.position.y += my * FP_SPEED * 0.7;
}

/* ══════════════════════════════════════════ JOYSTICKS ══════════════════════════════════════════ */
const joy = { move:{x:0,y:0}, look:{x:0,y:0} };

function initJoy(zoneId, knobId, key) {
  const zone = document.getElementById(zoneId);
  const knob = document.getElementById(knobId);
  let active = false, cx=0, cy=0;

  function start(e) { e.preventDefault(); active=true;
    const r=zone.getBoundingClientRect(); cx=r.left+r.width/2; cy=r.top+r.height/2; move(e); }
  function move(e) { if(!active) return; const t=e.touches?e.touches[0]:e;
    let dx=(t.clientX-cx)/50, dy=(t.clientY-cy)/50;
    const l=Math.sqrt(dx*dx+dy*dy); if(l>1){dx/=l;dy/=l;}
    joy[key].x=dx; joy[key].y=dy;
    knob.style.transform=`translate(calc(-50% + ${dx*25}px), calc(-50% + ${dy*25}px))`; }
  function end() { active=false; joy[key]={x:0,y:0};
    knob.style.transform='translate(-50%,-50%)'; }

  zone.addEventListener('touchstart',start,{passive:false});
  zone.addEventListener('touchmove',(e)=>{e.preventDefault();move(e);},{passive:false});
  zone.addEventListener('touchend',end); zone.addEventListener('touchcancel',end);
  zone.addEventListener('mousedown',start);
  window.addEventListener('mousemove',(e)=>{if(active)move(e);});
  window.addEventListener('mouseup',()=>{if(active)end();});
}
initJoy('joystickMove','moveKnob','move');
initJoy('joystickLook','lookKnob','look');

function updateJoy() {
  const {move,look} = joy;
  if (Math.abs(move.x)>0.1 || Math.abs(move.y)>0.1) {
    if(!fpMode){fpMode=true;orbitControls.enabled=false;}
    const yaw=camera.rotation.y, s=Math.sin(yaw), c=Math.cos(yaw), sp=FP_SPEED*0.6;
    camera.position.x += (move.x*c - (-move.y)*s)*sp;
    camera.position.z += (move.x*s + (-move.y)*c)*sp;
  }
  if (Math.abs(look.x)>0.1 || Math.abs(look.y)>0.1) {
    if(!fpMode){fpMode=true;orbitControls.enabled=false;}
    camera.rotation.y -= look.x*0.03;
    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - look.y*0.02));
  }
}

/* ══════════════════════════════════════════ XR ══════════════════════════════════════════ */
const xrRay = new THREE.Raycaster();
const tmpMat = new THREE.Matrix4();

const c0 = renderer.xr.getController(0);
c0.addEventListener('selectstart', onXR); scene.add(c0);
const c1 = renderer.xr.getController(1);
c1.addEventListener('selectstart', onXR); scene.add(c1);

function mkRay(){const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-20)]);
return new THREE.Line(g,new THREE.LineBasicMaterial({color:0x00ffff}));}
c0.add(mkRay()); c1.add(mkRay());

const fac=new XRControllerModelFactory();
const gr0=renderer.xr.getControllerGrip(0); gr0.add(fac.createControllerModel(gr0)); scene.add(gr0);
const gr1=renderer.xr.getControllerGrip(1); gr1.add(fac.createControllerModel(gr1)); scene.add(gr1);

const hitDot=new THREE.Mesh(new THREE.SphereGeometry(0.1,16,16),new THREE.MeshBasicMaterial({color:0xff3333}));
hitDot.visible=false; scene.add(hitDot);

// 3D label sprite for VR
let vrLabel = null;
function makeVRLabel(text, bgColor) {
  const cv = document.createElement('canvas'); cv.width=512; cv.height=96;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=bgColor; ctx.fillRect(0,0,512,96);
  ctx.fillStyle='#000'; ctx.font='bold 32px system-ui'; ctx.textAlign='center';
  ctx.fillText(text,256,58);
  const tex=new THREE.CanvasTexture(cv);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  sp.scale.set(2.5,0.5,1);
  return sp;
}

function onXR(event) {
  const ctrl=event.target;
  tmpMat.identity().extractRotation(ctrl.matrixWorld);
  xrRay.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  xrRay.ray.direction.set(0,0,-1).applyMatrix4(tmpMat);
  const hits=xrRay.intersectObjects(allMeshes,false);
  if(hits.length>0){
    const pt=hits[0].point;
    hitDot.position.copy(pt); hitDot.visible=true;
    const sysIdx=hits[0].object.userData.sysIndex??0;
    const sys=SYSTEM_INFO[sysIdx];
    // Show floating label
    if(vrLabel) scene.remove(vrLabel);
    vrLabel=makeVRLabel(sys.label, sys.color);
    vrLabel.position.copy(pt); vrLabel.position.y+=0.5;
    scene.add(vrLabel);
  }
}

let xrSession=null;
async function setupXR(){
  const btn=document.getElementById('enterXR');
  if(!navigator.xr)return;
  const arOK=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  const vrOK=await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
  if(!arOK&&!vrOK)return;
  const mode=arOK?'immersive-ar':'immersive-vr';
  btn.textContent=arOK?'🥽 ENTER AR':'🥽 ENTER VR';
  btn.style.display='block';

  btn.addEventListener('click',async()=>{
    if(xrSession){xrSession.end();return;}
    try{
      const session=await navigator.xr.requestSession(mode,{
        requiredFeatures:['local-floor'],
        optionalFeatures:mode==='immersive-ar'?['plane-detection','hand-tracking']:['hand-tracking']
      });
      renderer.setClearColor(mode==='immersive-ar'?0x000000:0x0d1117, mode==='immersive-ar'?0:1);
      grid.visible=false; scene.fog=null;
      ['legend','clickInfo','floorNav','joystickMove','joystickLook','ctrlHint'].forEach(id=>
        document.getElementById(id).style.display='none');
      renderer.xr.setReferenceSpaceType('local-floor');
      renderer.xr.setSession(session);
      xrSession=session; btn.textContent='✕ EXIT';
      session.addEventListener('end',()=>{
        xrSession=null; btn.textContent=mode==='immersive-ar'?'🥽 ENTER AR':'🥽 ENTER VR';
        renderer.setClearColor(0x0a0e1a,1); grid.visible=true;
        scene.fog=new THREE.FogExp2(0x0a0e1a,0.006);
        ['legend','floorNav','joystickMove','joystickLook','ctrlHint'].forEach(id=>
          document.getElementById(id).style.display='');
      });
    }catch(e){console.error('XR error:',e);}
  });
}

/* VR locomotion */
const VM=0.12, VR=0.025;
function vrInput(){
  const session=renderer.xr.getSession(); if(!session)return;
  const cam=renderer.xr.getCamera();
  for(const src of session.inputSources){
    if(!src.gamepad)continue; const ax=src.gamepad.axes; if(ax.length<4)continue;
    if(src.handedness==='left'){
      const dx=ax[2],dz=ax[3];
      if(Math.abs(dx)>0.1||Math.abs(dz)>0.1){
        const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
        fwd.y=0;fwd.normalize();
        const rt=new THREE.Vector3(1,0,0).applyQuaternion(cam.quaternion);
        rt.y=0;rt.normalize();
        const off=new THREE.Vector3(); off.addScaledVector(rt,dx*VM); off.addScaledVector(fwd,-dz*VM);
        try{const ref=renderer.xr.getReferenceSpace();
        renderer.xr.setReferenceSpace(ref.getOffsetReferenceSpace(new XRRigidTransform({x:-off.x,y:0,z:-off.z,w:1})));}catch(e){}
      }
    }
    if(src.handedness==='right'){
      if(Math.abs(ax[2])>0.1){try{const a=-ax[2]*VR;const ref=renderer.xr.getReferenceSpace();
        renderer.xr.setReferenceSpace(ref.getOffsetReferenceSpace(new XRRigidTransform({x:0,y:0,z:0,w:1},{x:0,y:Math.sin(a/2),z:0,w:Math.cos(a/2)})));}catch(e){}}
      if(Math.abs(ax[3])>0.15){try{const ref=renderer.xr.getReferenceSpace();
        renderer.xr.setReferenceSpace(ref.getOffsetReferenceSpace(new XRRigidTransform({x:0,y:ax[3]*VM*0.5,z:0,w:1})));}catch(e){}}
    }
  }
}

/* ══════════════════════════════════════════ RENDER ══════════════════════════════════════════ */
renderer.setAnimationLoop(()=>{
  if(renderer.xr.isPresenting){ vrInput(); }
  else { updateFP(); updateJoy(); if(!fpMode) orbitControls.update(); }
  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
