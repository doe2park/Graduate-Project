<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimes MEP · XR</title>
<style>
  :root { --cyan: #2dd4bf; --bg: #0a0e1a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; }

  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--bg); z-index: 100;
    font-size: 18px; gap: 16px;
  }
  #loading .spinner {
    width: 48px; height: 48px; border: 3px solid #334155;
    border-top-color: var(--cyan); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #enterXR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: var(--cyan); color: #000; font-weight: 700; font-size: 18px;
    padding: 16px 40px; border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 24px rgba(45,212,191,0.4); z-index: 50;
    display: none;
  }
  #enterXR:hover { filter: brightness(1.1); }
  #enterXR:disabled { opacity: 0.4; cursor: default; }

  #info {
    position: fixed; top: 16px; left: 16px; z-index: 50;
    background: rgba(15,23,42,0.85); padding: 12px 16px; border-radius: 10px;
    font-size: 13px; backdrop-filter: blur(8px); border: 1px solid rgba(45,212,191,0.15);
  }
  #info h2 { font-size: 15px; color: var(--cyan); margin-bottom: 4px; }

  canvas { display: block; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loadText">Loading MEP model...</div>
</div>

<div id="info">
  <h2>Grimes Building · XR</h2>
  <div id="status">MEP-only lightweight model</div>
</div>

<button id="enterXR">Enter VR / AR</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

/* ── Renderer ── */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0e1a, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

/* ── Scene ── */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(5, 4, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

/* ── Lights (boosted for VR) ── */
scene.add(new THREE.AmbientLight(0xffffff, 3.0));
const dir = new THREE.DirectionalLight(0xffffff, 3.0);
dir.position.set(10, 20, 15);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0xffffff, 2.0);
dir2.position.set(-10, 15, -10);
scene.add(dir2);
const dir3 = new THREE.DirectionalLight(0xffffff, 1.5);
dir3.position.set(0, -10, 20);
scene.add(dir3);
scene.add(new THREE.HemisphereLight(0xffffff, 0x666688, 2.0));

/* ── Grid (hidden in XR) ── */
const grid = new THREE.GridHelper(20, 20, 0x1a2535, 0x111825);
scene.add(grid);

/* ── System colors ── */
const SYS_COLORS = {
  hvac: 0x2dd4bf, water: 0x38bdf8, fire: 0xfb923c, elec: 0xf59e0b, default: 0xa78bfa
};

function guessSystem(name) {
  if (!name) return 'default';
  if (/Ductile_Iron/i.test(name)) return 'water';
  if (/Galvanized|Insulation|VENTILATOR/i.test(name)) return 'hvac';
  if (/FWP/i.test(name)) return 'fire';
  if (/Sensor|PT-/i.test(name)) return 'elec';
  return 'default';
}

/* ── Load MEP GLB ── */
const loadingEl = document.getElementById('loadText');
const statusEl = document.getElementById('status');
const allMeshes = [];

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

// Try MEP-only first, fall back to full model
const glbUrl = 'grimes-mep-only.glb';

loader.load(glbUrl, (gltf) => {
  const model = gltf.scene;
  mepGroup.add(model);
  modelRef = model;

  let meshCount = 0;
  model.traverse(child => {
    if (child.isMesh) {
      meshCount++;
      allMeshes.push(child);

      // Bright emissive material — visible in VR without relying on lighting
      child.material = new THREE.MeshStandardMaterial({
        color: 0x2dd4bf,
        emissive: 0x2dd4bf,
        emissiveIntensity: 0.6,
        metalness: 0.2,
        roughness: 0.4,
        side: THREE.DoubleSide,
      });
    }
  });

  // Auto-fit camera and center model at origin
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  
  // Move model so it's centered at origin
  model.position.sub(center);
  
  // Scale down for VR — model should be ~2m across for comfortable viewing
  const maxDim = Math.max(size.x, size.y, size.z);
  const vrScale = 3.0 / maxDim;
  mepGroup.scale.setScalar(vrScale);
  mepGroup.position.set(0, 1.2, -2); // eye level, 2m in front

  // Desktop camera
  camera.position.set(3, 2, 4);
  controls.target.set(0, 1.2, -2);
  controls.update();

  document.getElementById('loading').style.display = 'none';
  statusEl.textContent = `${meshCount} MEP meshes · Thumbstick to move · Squeeze both to scale`;

  // Show XR button
  setupXR();

}, (progress) => {
  if (progress.total > 0) {
    const pct = Math.min(100, (progress.loaded / progress.total * 100)).toFixed(0);
    loadingEl.textContent = `Loading MEP... ${pct}%`;
  } else {
    const kb = (progress.loaded / 1024).toFixed(0);
    loadingEl.textContent = `Loading MEP... ${kb} KB`;
  }
}, (err) => {
  console.error('GLB load error:', err);
  loadingEl.textContent = 'grimes-mep-only.glb not found. Export it from the main viewer (📦 button).';
  loadingEl.style.color = '#f87171';
});

/* ── XR Controllers ── */
const xrRay = new THREE.Raycaster();
const xrMat = new THREE.Matrix4();

const controller0 = renderer.xr.getController(0);
controller0.addEventListener('selectstart', onXRSelect);
scene.add(controller0);
const controller1 = renderer.xr.getController(1);
controller1.addEventListener('selectstart', onXRSelect);
scene.add(controller1);

// Brighter ray lines
function makeLine() {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-8)]);
  return new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
}
controller0.add(makeLine());
controller1.add(makeLine());

const factory = new XRControllerModelFactory();
const grip0 = renderer.xr.getControllerGrip(0);
grip0.add(factory.createControllerModel(grip0));
scene.add(grip0);
const grip1 = renderer.xr.getControllerGrip(1);
grip1.add(factory.createControllerModel(grip1));
scene.add(grip1);

// Hit point indicator — glowing sphere where ray hits
const hitSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.8 })
);
hitSphere.visible = false;
scene.add(hitSphere);

// 3D text label (using sprite)
function makeLabel(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, 512, 128);
  ctx.fillStyle = '#2dd4bf';
  ctx.font = 'bold 36px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 50);
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '26px system-ui';
  ctx.fillText('MEP System', 256, 95);

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(2, 0.5, 1);
  return sprite;
}

let floatingLabel = null;

function onXRSelect(event) {
  const c = event.target;
  xrMat.identity().extractRotation(c.matrixWorld);
  xrRay.ray.origin.setFromMatrixPosition(c.matrixWorld);
  xrRay.ray.direction.set(0, 0, -1).applyMatrix4(xrMat);

  const hits = xrRay.intersectObjects(allMeshes, false);
  if (hits.length > 0) {
    const point = hits[0].point;

    // Show hit sphere
    hitSphere.position.copy(point);
    hitSphere.visible = true;

    // Remove old label
    if (floatingLabel) scene.remove(floatingLabel);

    // Create floating label above hit point
    floatingLabel = makeLabel('Grimes MEP');
    floatingLabel.position.copy(point);
    floatingLabel.position.y += 0.8;
    scene.add(floatingLabel);

    statusEl.textContent = `Hit: (${point.x.toFixed(1)}, ${point.y.toFixed(1)}, ${point.z.toFixed(1)})`;
  } else {
    hitSphere.visible = false;
    if (floatingLabel) { scene.remove(floatingLabel); floatingLabel = null; }
  }
}

// ── Thumbstick navigation (move through model) ──
const mepGroup = new THREE.Group();
scene.add(mepGroup);

// Model reference for movement
let modelRef = null;

// Squeeze to grab & scale
let squeezing = [false, false];
let prevControllerDist = 0;

controller0.addEventListener('squeezestart', () => { squeezing[0] = true; });
controller0.addEventListener('squeezeend', () => { squeezing[0] = false; });
controller1.addEventListener('squeezestart', () => { squeezing[1] = true; });
controller1.addEventListener('squeezeend', () => { squeezing[1] = false; });

/* ── XR Session ── */
let xrSession = null;

async function setupXR() {
  const btn = document.getElementById('enterXR');

  if (!navigator.xr) {
    btn.textContent = 'WebXR not supported';
    btn.disabled = true;
    btn.style.display = 'block';
    return;
  }

  const arOK = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  const vrOK = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);

  if (!arOK && !vrOK) {
    btn.textContent = 'XR not available';
    btn.disabled = true;
    btn.style.display = 'block';
    return;
  }

  const mode = arOK ? 'immersive-ar' : 'immersive-vr';
  btn.textContent = arOK ? '🥽 Enter AR' : '🥽 Enter VR';
  btn.style.display = 'block';

  btn.addEventListener('click', async () => {
    if (xrSession) { xrSession.end(); return; }

    try {
      const opts = mode === 'immersive-ar' ? {
        requiredFeatures: ['local-floor'],
        optionalFeatures: ['plane-detection', 'hand-tracking']
      } : {
        requiredFeatures: ['local-floor'],
        optionalFeatures: ['hand-tracking']
      };

      const session = await navigator.xr.requestSession(mode, opts);

      // AR: transparent bg
      if (mode === 'immersive-ar') {
        renderer.setClearColor(0x000000, 0);
        grid.visible = false;
      } else {
        renderer.setClearColor(0x1a2030, 1);  // slightly lighter for VR
        grid.visible = false;
      }

      renderer.xr.setSession(session);
      xrSession = session;
      btn.textContent = '✕ Exit XR';

      session.addEventListener('end', () => {
        xrSession = null;
        btn.textContent = mode === 'immersive-ar' ? '🥽 Enter AR' : '🥽 Enter VR';
        renderer.setClearColor(0x0a0e1a, 1);
        grid.visible = true;
      });

    } catch (e) {
      console.error('XR error:', e);
      statusEl.textContent = 'XR failed: ' + e.message;
    }
  });
}

/* ── Render Loop ── */
renderer.setAnimationLoop(function animate() {
  if (!renderer.xr.isPresenting) {
    controls.update();
  } else {
    // Thumbstick movement in VR
    const session = renderer.xr.getSession();
    if (session) {
      for (const source of session.inputSources) {
        if (source.gamepad) {
          const axes = source.gamepad.axes;
          if (axes.length >= 4) {
            // Left stick: move model
            if (source.handedness === 'left') {
              const moveX = axes[2] * 0.03;
              const moveZ = axes[3] * 0.03;
              if (Math.abs(moveX) > 0.01 || Math.abs(moveZ) > 0.01) {
                const cam = renderer.xr.getCamera();
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(cam.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(cam.quaternion);
                right.y = 0; right.normalize();
                mepGroup.position.add(right.multiplyScalar(-moveX));
                mepGroup.position.add(forward.multiplyScalar(moveZ));
              }
              // Up/down with Y axis
              const moveY = axes[3] * 0.02;
              if (Math.abs(moveY) > 0.01) {
                // hold grip + thumbstick for Y movement
              }
            }
            // Right stick: rotate model
            if (source.handedness === 'right') {
              const rotY = axes[2] * 0.025;
              if (Math.abs(rotY) > 0.005) {
                mepGroup.rotation.y += rotY;
              }
              // Right stick Y: scale up/down
              const scaleY = axes[3] * 0.01;
              if (Math.abs(scaleY) > 0.005) {
                const s = 1 - scaleY;
                mepGroup.scale.multiplyScalar(Math.max(0.1, Math.min(10, s)));
              }
            }
          }
        }
      }

      // Pinch to scale (both squeezes)
      if (squeezing[0] && squeezing[1]) {
        const pos0 = new THREE.Vector3();
        const pos1 = new THREE.Vector3();
        controller0.getWorldPosition(pos0);
        controller1.getWorldPosition(pos1);
        const dist = pos0.distanceTo(pos1);
        if (prevControllerDist > 0) {
          const scaleFactor = dist / prevControllerDist;
          mepGroup.scale.multiplyScalar(scaleFactor);
        }
        prevControllerDist = dist;
      } else {
        prevControllerDist = 0;
      }
    }
  }

  renderer.render(scene, camera);
});

/* ── Resize ── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
