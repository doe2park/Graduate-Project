<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Berkeley · Campus Digital Twin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap');
  :root { --bg:#070b14; --surface:#0d1220; --border:rgba(45,212,191,.12); --cyan:#2dd4bf; --dim:rgba(45,212,191,.15); --text:#e2e8f0; --muted:#64748b; --font:'Outfit',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; height:100vh; }
  #map { position:absolute; inset:0; z-index:1; }

  .leaflet-control-zoom { border:none!important; }
  .leaflet-control-zoom a { background:var(--surface)!important; color:var(--cyan)!important; border:1px solid var(--border)!important; border-radius:8px!important; width:36px!important; height:36px!important; line-height:36px!important; font-size:18px!important; }
  .leaflet-control-attribution { background:rgba(7,11,20,.8)!important; color:var(--muted)!important; font-size:9px!important; }
  .leaflet-control-attribution a { color:var(--cyan)!important; }

  #topbar { position:fixed; top:0; left:0; right:0; z-index:1000; display:flex; align-items:center; gap:16px; padding:12px 20px; background:rgba(7,11,20,.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-mark { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--cyan),#38bdf8); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:12px; color:#000; }
  .logo h1 { font-size:16px; font-weight:700; letter-spacing:-.5px; white-space:nowrap; }
  .logo h1 span { color:var(--cyan); }
  .topbar-stats { margin-left:auto; display:flex; gap:16px; font-size:11px; color:var(--muted); }
  .topbar-stats .val { color:var(--cyan); font-weight:600; font-family:var(--mono); }

  /* Category filters */
  #filters { position:fixed; top:52px; left:50%; transform:translateX(-50%); z-index:1000; display:flex; gap:6px; padding:8px 12px; background:rgba(7,11,20,.9); backdrop-filter:blur(12px); border-radius:0 0 12px 12px; border:1px solid var(--border); border-top:none; }
  .cat-btn { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:var(--muted); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:10px; font-weight:600; font-family:var(--font); transition:all .15s; }
  .cat-btn.active { background:var(--dim); color:var(--cyan); border-color:var(--cyan); }
  .cat-btn:hover { border-color:rgba(255,255,255,.15); }

  /* Side panel */
  #sidePanel { position:fixed; top:52px; left:0; bottom:0; z-index:1000; width:250px; background:rgba(13,18,32,.94); backdrop-filter:blur(16px); border-right:1px solid var(--border); padding:12px; overflow-y:auto; transition:transform .3s; }
  #sidePanel.hidden { transform:translateX(-260px); }
  #spToggle { position:fixed; top:60px; left:8px; z-index:1001; width:36px; height:36px; border-radius:8px; background:var(--surface); border:1px solid var(--border); color:var(--cyan); font-size:16px; cursor:pointer; display:none; }
  @media(max-width:768px) { #sidePanel { transform:translateX(-260px); } #sidePanel.show { transform:translateX(0); } #spToggle { display:block; } #filters { left:50px; transform:none; font-size:9px; } }
  #sidePanel h2 { font-size:12px; color:var(--cyan); margin-bottom:8px; letter-spacing:.5px; text-transform:uppercase; padding:0 4px; }
  .sp-search { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,.03); color:var(--text); font-family:var(--font); font-size:12px; margin-bottom:8px; outline:none; }
  .sp-search:focus { border-color:var(--cyan); }
  .sp-item { display:flex; align-items:center; gap:8px; padding:8px; border-radius:8px; cursor:pointer; transition:background .15s; margin-bottom:2px; }
  .sp-item:hover { background:var(--dim); }
  .sp-icon { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
  .sp-icon.active { background:linear-gradient(135deg,var(--cyan),#38bdf8); color:#000; }
  .sp-icon.inactive { background:rgba(100,116,139,.15); color:#64748b; }
  .sp-name { font-size:11px; font-weight:600; line-height:1.2; }
  .sp-sub { font-size:9px; color:var(--muted); }
  .sp-badge { margin-left:auto; font-size:8px; padding:2px 5px; border-radius:3px; font-weight:600; font-family:var(--mono); }
  .sp-badge.live { background:rgba(45,212,191,.15); color:var(--cyan); }
  .sp-badge.offline { background:rgba(100,116,139,.1); color:#475569; }

  .sp-count { font-size:10px; color:var(--muted); padding:4px; text-align:center; }

  /* Popup */
  .building-popup { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; min-width:240px; box-shadow:0 12px 48px rgba(0,0,0,.6); font-family:var(--font); }
  .building-popup h3 { font-size:14px; font-weight:700; margin-bottom:2px; color:var(--text); }
  .building-popup .bp-type { font-size:10px; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
  .bp-stats { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:12px; }
  .bp-stat { background:rgba(45,212,191,.04); border:1px solid rgba(45,212,191,.06); border-radius:6px; padding:6px 8px; }
  .bp-stat-label { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .bp-stat-val { font-size:13px; font-weight:700; font-family:var(--mono); color:var(--text); margin-top:1px; }
  .bp-stat-val.ok { color:var(--cyan); } .bp-stat-val.warn { color:#fb923c; }
  .bp-enter { display:block; width:100%; padding:9px 0; border:none; border-radius:8px; background:var(--cyan); color:#000; font-weight:700; font-size:13px; font-family:var(--font); cursor:pointer; }
  .bp-enter:hover { filter:brightness(1.1); }
  .bp-enter:disabled { opacity:.25; cursor:default; }
  .bp-no-bim { text-align:center; color:var(--muted); font-size:10px; padding:6px 0; }

  .leaflet-popup-custom .leaflet-popup-content-wrapper { background:transparent; box-shadow:none; border-radius:0; padding:0; }
  .leaflet-popup-custom .leaflet-popup-content { margin:0; }
  .leaflet-popup-custom .leaflet-popup-tip { background:var(--surface); }
  .leaflet-popup-close-button { color:var(--muted)!important; font-size:16px!important; top:6px!important; right:8px!important; }

  /* Marker */
  .bldg-marker { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; box-shadow:0 3px 12px rgba(0,0,0,.4); border:2px solid rgba(255,255,255,.1); cursor:pointer; transition:transform .15s; }
  .bldg-marker:hover { transform:scale(1.2); }
  .bldg-marker.has-bim { background:linear-gradient(135deg,var(--cyan),#38bdf8); color:#000; font-weight:700; }
  .bldg-marker.no-bim { background:rgba(100,116,139,.25); color:#94a3b8; border-color:rgba(100,116,139,.2); }
  .bldg-marker .pulse { position:absolute; inset:-5px; border-radius:12px; border:2px solid var(--cyan); animation:pulse 2s ease-out infinite; }
  @keyframes pulse { 0%{opacity:.6;transform:scale(1)} 100%{opacity:0;transform:scale(1.5)} }
</style>
</head>

/* ═══ MAP ═══ */
const map = L.map('map', { center:[37.87220,-122.25780], zoom:16, zoomControl:false });
const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:20, subdomains:'abcd', attribution:'&copy; OSM &copy; CARTO' });
const satelliteTile = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:20, attribution:'&copy; Esri' });
const labelTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', { maxZoom:20, subdomains:'abcd' });

// Default to satellite
satelliteTile.addTo(map);
labelTile.addTo(map);
let isSatellite = true;

// Map style toggle button
const styleBtn = document.createElement('button');
styleBtn.textContent = '🌙 Dark';
styleBtn.style.cssText = 'position:fixed;bottom:16px;left:270px;z-index:1000;background:var(--surface);border:1px solid var(--border);color:var(--cyan);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);backdrop-filter:blur(8px);';
document.body.appendChild(styleBtn);
styleBtn.addEventListener('click', () => {
  if (isSatellite) {
    map.removeLayer(satelliteTile);
    map.removeLayer(labelTile);
    darkTile.addTo(map);
    styleBtn.textContent = '🛰️ Satellite';
  } else {
    map.removeLayer(darkTile);
    satelliteTile.addTo(map);
    labelTile.addTo(map);
    styleBtn.textContent = '🌙 Dark';
  }
  isSatellite = !isSatellite;
});
L.control.zoom({ position:'bottomright' }).addTo(map);

/* ═══ MARKERS ═══ */
const markers = {};
const markerLayer = L.layerGroup().addTo(map);
let activeCategory = 'all';

function createMarkers(filter) {
  markerLayer.clearLayers();
  const filtered = filter === 'all' ? BUILDINGS : BUILDINGS.filter(b => b.cat === filter);

  filtered.forEach(bldg => {
    const iconHtml = bldg.hasBIM
      ? '<div class="bldg-marker has-bim"><div class="pulse"></div>🏢</div>'
      : '<div class="bldg-marker no-bim">🏢</div>';
    const icon = L.divIcon({ html:iconHtml, className:'', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-18] });
    const marker = L.marker([bldg.lat, bldg.lng], { icon }).addTo(markerLayer);

    let popup = `<div class="building-popup"><h3>${bldg.name}</h3>`;
    if (bldg.alias) popup += `<div style="font-size:10px;color:#94a3b8;margin-bottom:1px">${bldg.alias}</div>`;
    popup += `<div class="bp-type">${bldg.type}</div><div class="bp-stats">`;
    popup += `<div class="bp-stat"><div class="bp-stat-label">Floors</div><div class="bp-stat-val">${bldg.floors}</div></div>`;
    popup += `<div class="bp-stat"><div class="bp-stat-label">Area</div><div class="bp-stat-val">${bldg.sqft} ft²</div></div>`;
    if (bldg.hasBIM) {
      popup += `<div class="bp-stat"><div class="bp-stat-label">MEP Systems</div><div class="bp-stat-val ok">${bldg.mepSystems}</div></div>`;
      popup += `<div class="bp-stat"><div class="bp-stat-label">Energy</div><div class="bp-stat-val warn">${bldg.energy}</div></div>`;
      popup += `</div><button class="bp-enter" data-url="${bldg.viewerUrl}">Enter 3D Digital Twin →</button>`;
    } else {
      popup += `<div class="bp-stat"><div class="bp-stat-label">Built</div><div class="bp-stat-val">${bldg.year}</div></div>`;
      popup += `<div class="bp-stat"><div class="bp-stat-label">BIM</div><div class="bp-stat-val" style="color:#475569">—</div></div>`;
      popup += `</div><div class="bp-no-bim">BIM model not yet available</div><button class="bp-enter" disabled>No BIM Data</button>`;
    }
    popup += '</div>';
    marker.bindPopup(popup, { className:'leaflet-popup-custom', maxWidth:280 });
    markers[bldg.id] = marker;
  });

  return filtered;
}

createMarkers('all');

/* ═══ CATEGORY FILTERS ═══ */
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCategory = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
  createMarkers(activeCategory);
  buildSidePanel(activeCategory);
});

/* ═══ POPUP BUTTON ═══ */
document.addEventListener('click', e => {
  const btn = e.target.closest('.bp-enter');
  if (btn && btn.dataset.url) window.location.href = btn.dataset.url;
});

/* ═══ SIDE PANEL ═══ */
function buildSidePanel(filter) {
  const list = document.getElementById('buildingList');
  list.innerHTML = '';
  const filtered = filter === 'all' ? BUILDINGS : BUILDINGS.filter(b => b.cat === filter);
  const search = document.getElementById('search').value.toLowerCase();

  const shown = search ? filtered.filter(b => b.name.toLowerCase().includes(search) || b.type.toLowerCase().includes(search) || (b.alias && b.alias.toLowerCase().includes(search))) : filtered;

  shown.forEach(bldg => {
    const item = document.createElement('div');
    item.className = 'sp-item';
    item.innerHTML = `
      <div class="sp-icon ${bldg.hasBIM ? 'active' : 'inactive'}">🏢</div>
      <div><div class="sp-name">${bldg.alias || bldg.name}</div><div class="sp-sub">${bldg.type}</div></div>
      <span class="sp-badge ${bldg.hasBIM ? 'live' : 'offline'}">${bldg.hasBIM ? 'LIVE' : ''}</span>`;
    item.addEventListener('click', () => {
      map.flyTo([bldg.lat, bldg.lng], 18, { duration:.6 });
      setTimeout(() => { if (markers[bldg.id]) markers[bldg.id].openPopup(); }, 300);
    });
    list.appendChild(item);
  });
  document.getElementById('spCount').textContent = `${shown.length} of ${BUILDINGS.length} buildings`;
}
buildSidePanel('all');

document.getElementById('search').addEventListener('input', () => buildSidePanel(activeCategory));

/* ═══ GPS ═══ */
if (navigator.geolocation) {
  let userMarker = null;
  navigator.geolocation.watchPosition(pos => {
    const { latitude:lat, longitude:lng } = pos.coords;
    if (!userMarker) {
      userMarker = L.marker([lat,lng], { icon: L.divIcon({ html:'<div style="width:14px;height:14px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 10px rgba(59,130,246,.6)"></div>', className:'', iconSize:[14,14], iconAnchor:[7,7] }) }).addTo(map);
    } else userMarker.setLatLng([lat,lng]);
  }, () => {}, { enableHighAccuracy:true, maximumAge:5000 });
}

/* ═══ SIDEBAR TOGGLE (mobile) ═══ */
document.getElementById('spToggle').addEventListener('click', () => {
  const sp = document.getElementById('sidePanel');
  sp.classList.toggle('show');
});

/* ═══ LIVE DATA for Grimes ═══ */
let grimesLiveData = null;
fetch('https://doe2park.github.io/Graduate-Project/data/building_data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    grimesLiveData = data;
    const m = data.meters;
    const total = (m['3']?.latest?.kw||0) + (m['76']?.latest?.kw||0) + (m['77']?.latest?.kw||0);
    const grimes = BUILDINGS.find(b => b.id === 'grimes');
    if (grimes && total > 0) {
      grimes.energy = total.toFixed(0) + ' kW';
      grimes.status = 'live';
      // Update marker with live kW badge
      if (markers['grimes']) {
        const m = markers['grimes'];
        const newIcon = L.divIcon({
          html: `<div class="bldg-marker has-bim"><div class="pulse"></div>🏢</div><div style="position:absolute;top:-8px;right:-12px;background:#2dd4bf;color:#000;font-size:9px;font-weight:700;padding:1px 4px;border-radius:4px;white-space:nowrap;font-family:var(--mono)">${total.toFixed(0)}kW</div>`,
          className: '', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-18]
        });
        m.setIcon(newIcon);
      }
      console.log('📡 Live energy:', grimes.energy);
    }
  }).catch(() => {});

/* ═══ STATS ═══ */
document.getElementById('tsB').textContent = BUILDINGS.length;
document.getElementById('tsBim').textContent = BUILDINGS.filter(b => b.hasBIM).length;
</script>
</body>
</html>
