<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live Comfort Pulse · UC Berkeley Digital Twin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1020;--panel:rgba(15,23,42,.92);--border:rgba(253,181,21,.12);--gold:#FDB515;--cyan:#2dd4bf;--text:#e2e8f0;--dim:#64748b;--faint:#334155;--red:#f87171;--green:#34d399;--blue:#60a5fa;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
a{color:var(--cyan);text-decoration:none}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);flex-wrap:wrap}
.hdr-back{padding:6px 14px;border-radius:8px;border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600}
.hdr-back:hover{border-color:var(--gold);color:var(--gold)}
.hdr h1{font-size:16px;color:var(--gold);font-weight:700}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.updated{margin-left:auto;font-size:10px;color:var(--dim);font-family:var(--mono)}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font:700 28px/1 var(--mono)}
.stat-sub{font-size:10px;color:var(--dim);margin-top:4px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.bldg-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--faint)}
.bldg-row:last-child{border-bottom:none}
.bldg-name{flex:0 0 200px;font-size:13px;font-weight:600}
.bldg-bar{flex:1;height:20px;display:flex;border-radius:4px;overflow:hidden;background:var(--faint);min-width:120px}
.bldg-count{flex:0 0 80px;text-align:right;font-size:11px;color:var(--dim);font-family:var(--mono)}
.bldg-status{flex:0 0 130px;font-size:11px;font-weight:600;text-align:right}
.empty{text-align:center;padding:40px;color:var(--dim);font-size:13px}
.grid2{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}.bldg-name{flex:0 0 120px;font-size:12px}.bldg-count{flex:0 0 60px;font-size:10px}.bldg-status{display:none}}
.recent{max-height:400px;overflow-y:auto}
.recent-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--faint);font-size:11px}
.recent-time{color:var(--dim);font-family:var(--mono);flex:0 0 60px}
.recent-icon{flex:0 0 24px;font-size:16px;text-align:center}
.recent-text{flex:1}
</style>
</head>
<body>
<div class="hdr">
  <a href="grimes-campus-map-arcgis.html" class="hdr-back">← Map</a>
  <a href="vote.html" class="hdr-back">🗳 Vote Page</a>
  <h1><span class="live-dot"></span>Live Comfort Pulse</h1>
  <div class="updated" id="updated">—</div>
</div>
<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">🏢 Building Comfort — Last 2 hours</div>
      <div id="bldgList"><div class="empty">Loading...</div></div>
    </div>
    <div class="card">
      <div class="card-title">📡 Recent Feedback</div>
      <div class="recent" id="recent"><div class="empty">—</div></div>
    </div>
  </div>
</div>

<script>
const API = 'https://comfort-vote.ucb-dt.workers.dev';
const NAMES = {grimes:'Grimes Engineering Center',etcheverry:'Etcheverry Hall',cory:'Cory Hall',soda:'Soda Hall',sutardja:'Sutardja Dai Hall',valley:'Valley Life Sciences',evans:'Evans Hall',wheeler:'Wheeler Hall'};
function niceName(id){return NAMES[id]||id.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
function timeAgo(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago'}

async function load(){
  try {
    var r = await fetch(API+'/votes?t='+Date.now());
    var d = await r.json();
    var bldgs = d.buildings || {};
    var totalVotes=0, bldgCount=0, hotB=0, coldB=0;
    var sorted = [];
    for (var id in bldgs) {
      var v = bldgs[id];
      totalVotes += v.total; bldgCount++;
      if (v.status === 'too_hot') hotB++;
      if (v.status === 'too_cold') coldB++;
      sorted.push(Object.assign({id:id}, v));
    }
    sorted.sort(function(a,b){return b.total-a.total});

    document.getElementById('stats').innerHTML =
      '<div class="stat"><div class="stat-lbl">Total Votes</div><div class="stat-val" style="color:var(--gold)">'+totalVotes+'</div><div class="stat-sub">last 2 hours</div></div>'+
      '<div class="stat"><div class="stat-lbl">Buildings Reporting</div><div class="stat-val" style="color:var(--cyan)">'+bldgCount+'</div><div class="stat-sub">with active feedback</div></div>'+
      '<div class="stat"><div class="stat-lbl">Too Hot</div><div class="stat-val" style="color:var(--red)">'+hotB+'</div><div class="stat-sub">buildings flagged</div></div>'+
      '<div class="stat"><div class="stat-lbl">Too Cold</div><div class="stat-val" style="color:var(--blue)">'+coldB+'</div><div class="stat-sub">buildings flagged</div></div>';

    if (sorted.length === 0) {
      document.getElementById('bldgList').innerHTML = '<div class="empty">No feedback yet. Share QR codes to get votes!</div>';
    } else {
      document.getElementById('bldgList').innerHTML = sorted.map(function(v){
        var hp = v.total>0?v.hot/v.total*100:0;
        var op = v.total>0?v.ok/v.total*100:0;
        var cp = 100-hp-op;
        var tag, color;
        if (v.status==='too_hot'){tag='🔥 Too Hot';color='var(--red)'}
        else if (v.status==='too_cold'){tag='❄️ Too Cold';color='var(--blue)'}
        else {tag='😊 OK';color='var(--green)'}
        return '<div class="bldg-row">'+
          '<div class="bldg-name">'+niceName(v.id)+'</div>'+
          '<div class="bldg-bar">'+
            (hp>0?'<div style="width:'+hp+'%;background:var(--red)"></div>':'')+
            (op>0?'<div style="width:'+op+'%;background:var(--green)"></div>':'')+
            (cp>0?'<div style="width:'+cp+'%;background:var(--blue)"></div>':'')+
          '</div>'+
          '<div class="bldg-count">'+v.total+' votes</div>'+
          '<div class="bldg-status" style="color:'+color+'">'+tag+'</div>'+
        '</div>';
      }).join('');
    }

    if (sorted.length > 0) {
      try {
        var rr = await fetch(API+'/building/'+sorted[0].id+'?t='+Date.now());
        var rd = await rr.json();
        var recent = (rd.recent||[]).slice(0,15);
        if (recent.length > 0) {
          document.getElementById('recent').innerHTML = recent.map(function(r){
            var icon = r.vote==='hot'?'🔥':r.vote==='cold'?'❄️':'😊';
            var txt = r.vote==='hot'?'Too hot':r.vote==='cold'?'Too cold':'Comfortable';
            return '<div class="recent-item"><div class="recent-time">'+timeAgo(r.ts)+'</div><div class="recent-icon">'+icon+'</div><div class="recent-text"><b>'+niceName(sorted[0].id)+'</b> · '+txt+'</div></div>';
          }).join('');
        }
      } catch(e) {}
    }
    document.getElementById('updated').textContent = 'Updated: '+new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('bldgList').innerHTML = '<div class="empty">Failed to load. '+e.message+'</div>';
  }
}
load();
setInterval(load, 15000);
</script>
</body>
</html>
