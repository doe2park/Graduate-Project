<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Campus Energy Dashboard · UC Berkeley Digital Twin</title>
<style>
:root{--bg:#0a1020;--panel:rgba(15,23,42,.92);--border:rgba(253,181,21,.12);--gold:#FDB515;--cyan:#2dd4bf;--text:#e2e8f0;--dim:#64748b;--faint:#334155;--red:#f87171;--green:#34d399;--navy:#003262;--mono:'JetBrains Mono',ui-monospace,monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
a{color:var(--cyan);text-decoration:none}

/* Header */
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.hdr-back{padding:6px 14px;border-radius:8px;border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600}
.hdr-back:hover{border-color:var(--gold);color:var(--gold)}
.hdr h1{font-size:16px;color:var(--gold);font-weight:700}
.hdr-live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green)}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-ts{font-size:10px;color:var(--dim);font-family:var(--mono)}

/* Grid */
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font:700 28px/1 var(--mono);color:var(--cyan)}
.stat-val.gold{color:var(--gold)}
.stat-val.red{color:var(--red)}
.stat-val.green{color:var(--green)}
.stat-sub{font-size:10px;color:var(--dim);margin-top:4px}

/* Section */
.sec{margin-bottom:20px}
.sec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title span{font-size:10px;color:var(--dim);font-weight:400}

/* Building table */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--faint)}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;vertical-align:middle}
.tbl tr:hover td{background:rgba(253,181,21,.03)}
.tbl .name{font-weight:600;color:var(--text)}
.tbl .kw{font-family:var(--mono);font-weight:700;font-size:14px}
.tbl .off{color:var(--dim);font-style:italic}
.spark{display:flex;align-items:end;gap:1px;height:24px}
.spark-bar{width:3px;border-radius:1px;background:var(--cyan);opacity:.7;min-height:1px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:var(--mono)}
.badge-on{background:rgba(52,211,153,.15);color:var(--green)}
.badge-off{background:rgba(100,116,139,.15);color:var(--dim)}
.badge-warn{background:rgba(248,113,113,.15);color:var(--red)}
.cost{font-family:var(--mono);color:var(--gold);font-size:11px}
.co2{font-family:var(--mono);color:var(--green);font-size:11px}

/* Anomaly */
.anom{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.anom-icon{font-size:18px}
.anom-text{font-size:12px;color:var(--text)}
.anom-text b{color:var(--red)}
.no-anom{text-align:center;padding:20px;color:var(--dim);font-size:12px}

/* Chart area */
.chart-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.chart-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.chart-title{font-size:12px;font-weight:600;color:var(--text)}
.chart-val{font:700 18px var(--mono);color:var(--cyan)}
.campus-spark{display:flex;align-items:end;gap:2px;height:60px;padding-top:4px}
.campus-spark-bar{flex:1;border-radius:2px 2px 0 0;background:var(--cyan);opacity:.6;min-height:1px;position:relative;cursor:pointer;transition:opacity .2s}
.campus-spark-bar:hover{opacity:1}
.campus-spark-bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:9px;white-space:nowrap;color:var(--text);font-family:var(--mono);z-index:5}
.campus-spark-bar:hover .tip{display:block}

/* Responsive */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-val{font-size:22px}
  .tbl{display:block;overflow-x:auto}
  .hdr h1{font-size:13px}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr 1fr}
  .wrap{padding:10px}
}

/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--dim);font-size:14px;gap:10px}
.spin{width:20px;height:20px;border:2px solid var(--faint);border-top-color:var(--cyan);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="hdr">
  <a href="grimes-campus-map-arcgis.html" class="hdr-back">← Campus Map</a>
  <h1>⚡ Campus Energy Dashboard</h1>
  <div class="hdr-live"><div class="hdr-dot"></div>Live</div>
  <div class="hdr-ts" id="ts">--</div>
</div>

<div class="wrap" id="app">
  <div id="loading"><div class="spin"></div>Loading energy data...</div>
</div>

<script>
const DATA_URL = 'https://doe2park.github.io/Graduate-Project/data/campus_energy.json';
const HIST_URL = 'https://doe2park.github.io/Graduate-Project/data/campus_energy_history.json';

async function init() {
  const [dataRes, histRes] = await Promise.all([
    fetch(DATA_URL + '?t=' + Date.now()),
    fetch(HIST_URL + '?t=' + Date.now()).catch(() => null)
  ]);
  const data = await dataRes.json();
  let history = {};
  try { if (histRes && histRes.ok) history = await histRes.json(); } catch(e) {}

  document.getElementById('ts').textContent = data.generated_at || '';
  const app = document.getElementById('app');

  const blds = Object.entries(data.buildings).sort((a,b) => (b[1].kw||0) - (a[1].kw||0));
  const online = blds.filter(([,b]) => b.kw !== null);
  const offline = blds.filter(([,b]) => b.kw === null);
  const totalKw = data.total_kw || 0;
  const anomalies = data.anomalies || {};
  const anomKeys = Object.keys(anomalies);

  // Top 5 consumers
  const top5 = online.slice(0, 5);
  const topPct = top5.reduce((s,[,b]) => s + b.kw, 0) / totalKw * 100;

  app.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-lbl">Total Campus Load</div><div class="stat-val gold">${totalKw.toLocaleString()}</div><div class="stat-sub">kW · ${data.buildings_online}/${data.buildings_total} buildings</div></div>
      <div class="stat"><div class="stat-lbl">Est. Daily Cost</div><div class="stat-val">$${(data.total_daily_cost||0).toLocaleString()}</div><div class="stat-sub">@ $0.15/kWh</div></div>
      <div class="stat"><div class="stat-lbl">Daily CO₂</div><div class="stat-val green">${((data.total_daily_co2_kg||0)/1000).toFixed(1)}</div><div class="stat-sub">metric tons</div></div>
      <div class="stat"><div class="stat-lbl">Anomalies</div><div class="stat-val ${anomKeys.length ? 'red' : ''}">${anomKeys.length}</div><div class="stat-sub">${anomKeys.length ? anomKeys.join(', ') : 'All normal'}</div></div>
    </div>

    ${buildCampusChart(history, online)}

    <div class="sec">
      <div class="sec-title">⚠️ Anomaly Alerts <span>${anomKeys.length} active</span></div>
      ${anomKeys.length ? anomKeys.map(k => {
        const a = anomalies[k];
        const b = data.buildings[k];
        return `<div class="anom"><div class="anom-icon">🔴</div><div class="anom-text"><b>${b?.name || k}</b> — ${a.current} kW (${a.type === 'high' ? '↑' : '↓'} ${Math.round((a.ratio-1)*100)}% vs avg ${a.avg} kW)</div></div>`;
      }).join('') : '<div class="no-anom">✅ No anomalies detected — all buildings within normal range</div>'}
    </div>

    <div class="sec">
      <div class="sec-title">🏢 Building Rankings <span>${online.length} online · ${offline.length} offline</span></div>
      <div style="overflow-x:auto">
      <table class="tbl">
        <tr><th>#</th><th>Building</th><th>Status</th><th>kW</th><th>24hr Trend</th><th>$/day</th><th>CO₂/day</th><th>Predicted</th></tr>
        ${blds.map(([id, b], i) => {
          const spark = (b.sparkline || []);
          const maxS = Math.max(...spark, 1);
          return `<tr>
            <td style="color:var(--dim)">${i+1}</td>
            <td class="name">${b.name}</td>
            <td>${b.kw !== null ? '<span class="badge badge-on">LIVE</span>' : '<span class="badge badge-off">OFF</span>'}${anomalies[id] ? ' <span class="badge badge-warn">⚠️</span>' : ''}</td>
            <td class="${b.kw !== null ? 'kw' : 'off'}" style="color:${b.kw > 200 ? 'var(--red)' : b.kw > 100 ? 'var(--gold)' : 'var(--cyan)'}">${b.kw !== null ? b.kw + ' kW' : '—'}</td>
            <td><div class="spark">${spark.length ? spark.map(v => `<div class="spark-bar" style="height:${Math.max(2, v/maxS*24)}px"></div>`).join('') : '<span class="off">—</span>'}</div></td>
            <td class="cost">${b.est_daily_cost ? '$' + b.est_daily_cost.toLocaleString() : '—'}</td>
            <td class="co2">${b.est_daily_co2_kg ? b.est_daily_co2_kg + ' kg' : '—'}</td>
            <td style="font-family:var(--mono);font-size:11px;color:var(--dim)">${b.predicted_kw ? '~' + b.predicted_kw + ' kW' : '—'}</td>
          </tr>`;
        }).join('')}
      </table>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">📊 Top 5 Energy Consumers <span>${topPct.toFixed(0)}% of total</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${top5.map(([id, b]) => {
          const pct = (b.kw / totalKw * 100).toFixed(1);
          return `<div style="flex:1;min-width:140px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px">
            <div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px">${b.name}</div>
            <div style="font:700 20px var(--mono);color:var(--gold)">${b.kw} kW</div>
            <div style="margin-top:6px;height:6px;background:var(--faint);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--gold);border-radius:3px"></div></div>
            <div style="font-size:9px;color:var(--dim);margin-top:4px">${pct}% of campus · ~$${b.est_daily_cost}/day</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="text-align:center;padding:20px;font-size:10px;color:var(--faint)">
      Data from BMO Campus Metering System · Auto-updated every 15 minutes · <a href="grimes-campus-map-arcgis.html">Back to Map</a>
    </div>
  `;
}

function buildCampusChart(history, online) {
  // Build campus-wide sparkline from history
  const allTimes = new Set();
  for (const [id] of online) {
    const pts = history[id] || [];
    pts.forEach(p => allTimes.add(p.t));
  }
  const times = [...allTimes].sort().slice(-48);
  if (times.length < 2) return '';

  const totals = times.map(t => {
    let sum = 0;
    for (const [id] of online) {
      const pts = history[id] || [];
      const pt = pts.find(p => p.t === t);
      if (pt) sum += pt.kw;
    }
    return { t, kw: Math.round(sum) };
  });
  const maxKw = Math.max(...totals.map(t => t.kw), 1);

  return `<div class="chart-wrap">
    <div class="chart-header"><div class="chart-title">Campus Total Load (last ${times.length} readings)</div><div class="chart-val">${totals[totals.length-1]?.kw || '--'} kW</div></div>
    <div class="campus-spark">
      ${totals.map(t => `<div class="campus-spark-bar" style="height:${Math.max(3, t.kw/maxKw*56)}px"><div class="tip">${t.t} · ${t.kw} kW</div></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--dim);font-family:var(--mono)"><span>${times[0]}</span><span>${times[times.length-1]}</span></div>
  </div>`;
}

init().catch(e => {
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">Failed to load data: ' + e.message + '</div>';
});

// Auto-refresh every 60 seconds
setInterval(() => init().catch(()=>{}), 60000);
</script>
</body>
</html>
